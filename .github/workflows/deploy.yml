name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: https://vps-531e8f97.vps.ovh.net

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /var/www/batonnage/backend
            mkdir -p /var/www/batonnage/frontend/dist

      - name: Copy backend files
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            backend/server.js backend/db.js backend/package.json backend/package-lock.json \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/batonnage/backend/
          rm /tmp/deploy_key

      - name: Copy frontend dist
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -r \
            frontend/dist/* \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/batonnage/frontend/dist/
          rm /tmp/deploy_key

      - name: Install dependencies & restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/batonnage/backend
            npm install --omit=dev
            pm2 restart batonnage || pm2 start server.js --name batonnage
            pm2 save
