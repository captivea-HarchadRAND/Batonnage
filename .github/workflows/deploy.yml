name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: https://vps-531e8f97.vps.ovh.net

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create directories on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /var/www/batonnage/backend /var/www/batonnage/frontend/dist"

      - name: Copy backend files
        run: |
          scp -i ~/.ssh/deploy_key \
            backend/server.js backend/db.js backend/package.json backend/package-lock.json \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/batonnage/backend/

      - name: Copy frontend dist
        run: |
          scp -i ~/.ssh/deploy_key -r \
            frontend/dist/* \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/batonnage/frontend/dist/

      - name: Install dependencies & restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /var/www/batonnage/backend &&
            npm install --omit=dev &&
            pm2 restart batonnage || pm2 start server.js --name batonnage &&
            pm2 save
          "
